<!DOCTYPE html>
<html>
<head>
    <title>TAGGLIO Admin</title>
</head>
<body>

<h1>TAGGLIO Admin Panel</h1>
<div style="margin-bottom:20px;">

    <a href="admin.html">Products</a>

    |

    <a href="orders.html">Orders</a>

</div>

<input type="text" id="name" placeholder="Product Name"><br><br>

<input type="number" id="price" placeholder="Price"><br><br>

<input type="number" id="mrp" placeholder="MRP"><br><br>

<input type="file" id="image" multiple>

<input type="text" id="badge" placeholder="Badge"><br><br>

<input type="text" id="category" placeholder="Category"><br><br>

<button onclick="addProduct()">Add Product</button>
<hr>

<h2>Available Products</h2>

<div id="productsList"></div>

<script>

async function addProduct(){
const imageFiles = document.getElementById("image").files;
const formData = new FormData();

for (let file of imageFiles) {

    formData.append("images", file);

}

const uploadResponse = await fetch("http://localhost:5000/api/upload", {
    method: "POST",
    body: formData
});

const uploadData = await uploadResponse.json();
    const product={

        name:document.getElementById("name").value,

        price:Number(document.getElementById("price").value),

        mrp:Number(document.getElementById("mrp").value),

        images: uploadData.images,
        badge:document.getElementById("badge").value,

        category:document.getElementById("category").value

    };

    const response=await fetch("http://localhost:5000/api/products",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(product)

    });

    const data=await response.json();

    alert(data.message);

}
async function loadProducts() {

    try {

        const response = await fetch("http://localhost:5000/api/products");

        const products = await response.json();

        const list = document.getElementById("productsList");

        list.innerHTML = "";

        products.forEach(product => {

           list.innerHTML += `

<div style="
    border:1px solid #ccc;
    padding:15px;
    margin:10px;
    border-radius:10px;
    ">
        <img src="http://localhost:5000/uploads/${product.images[0]}" alt="${product.name}" style="max-width:100%; height:auto; border-radius:5px; margin-bottom:10px;"/>
        <h3>${product.name}</h3>
        <p>Price : ₹${product.price}</p>
        <p>MRP : ₹${product.mrp}</p>
        <p>Category : ${product.category}</p>
        <p>Badge : ${product.badge}</p>
        <button onclick="editProduct('${product._id}')">Edit</button>
        <button onclick="deleteProduct('${product._id}')">Delete</button>
    </div>`;

        });

    } catch(error){

        console.log(error);

    }

}
loadProducts();
async function deleteProduct(id){

    const response = await fetch(
        "http://localhost:5000/api/products/" + id,
        {
            method: "DELETE"
        }
    );

    const data = await response.json();

    alert(data.message);

    loadProducts();

}
async function editProduct(id) {

    const newName = prompt("Enter new Product Name");

    const newPrice = prompt("Enter new Price");

    if (!newName || !newPrice) return;

    const response = await fetch(
        "http://localhost:5000/api/products/" + id,
        {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: newName,
                price: Number(newPrice)
            })
        }
    );

    const data = await response.json();

    alert(data.message);

    loadProducts();

}
</script>

</body>
</html>
